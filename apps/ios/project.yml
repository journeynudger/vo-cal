name: VoCal
options:
  bundleIdPrefix: com.vocal
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    # DEVELOPMENT_TEAM intentionally unset until Phase I0 confirms the Apple account.
    # Voice-log API base. Surfaced into Info.plist (VOCAL_API_BASE_URL) and read by
    # APIClient. Defaults to the local backend in every config until a hosted env exists;
    # the live path only runs in release builds (DEBUG/UITestMode use the mock path).
    VOCAL_API_BASE_URL: http://localhost:8000
    # Supabase auth (Phase F). URL + PUBLISHABLE (anon) key only — both are safe to ship in
    # the app; the secret key never leaves the FastAPI server. Surfaced into Info.plist and
    # read by SupabaseConfig. Empty values ⇒ no auth client ⇒ mock path only.
    VOCAL_SUPABASE_URL: https://cwrgfibbwwfturvhazlk.supabase.co
    VOCAL_SUPABASE_ANON_KEY: sb_publishable_VpMe1yGySeuMf3-kDmQC5A_kuaibRGp
  release:
    DWARF_DSYM_FILE_SHOULD_ACCOMPANY_PRODUCT: NO

targets:
  VoCal:
    type: application
    platform: iOS
    sources:
      - path: VoCal
        excludes:
          - "**/.DS_Store"
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vocal.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SupportingFiles/Info.plist
        PRODUCT_NAME: VoCal
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: SupportingFiles/VoCal.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vocal.shared
    dependencies:
      - package: VoCalKit
        product: VoCalCore
      - package: VoCalKit
        product: VoCalCapture
      - package: VoCalKit
        product: VoCalVoice
      - package: Supabase
        product: Supabase

packages:
  VoCalKit:
    path: ../..
  # Supabase Swift SDK. Added now for the live path (auth/session + storage land in
  # Phase F); the Phase D APIClient talks to the FastAPI backend over plain REST and does
  # not consume this yet. Pinned to a release range so the resolved graph is reproducible.
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

schemes:
  VoCal:
    build:
      targets:
        VoCal: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  VoCal-UITest:
    build:
      targets:
        VoCal: all
    run:
      config: Debug
      commandLineArguments:
        "-UITestMode": true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
