name: VoCal
options:
  bundleIdPrefix: com.vocal
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    # DEVELOPMENT_TEAM intentionally unset until Phase I0 confirms the Apple account.
  release:
    DWARF_DSYM_FILE_SHOULD_ACCOMPANY_PRODUCT: NO

targets:
  VoCal:
    type: application
    platform: iOS
    sources:
      - path: VoCal
        excludes:
          - "**/.DS_Store"
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vocal.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SupportingFiles/Info.plist
        PRODUCT_NAME: VoCal
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: SupportingFiles/VoCal.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.vocal.shared
    dependencies:
      - package: VoCalKit
        product: VoCalCore
      - package: VoCalKit
        product: VoCalCapture
      - package: VoCalKit
        product: VoCalVoice

packages:
  VoCalKit:
    path: ../..

schemes:
  VoCal:
    build:
      targets:
        VoCal: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  VoCal-UITest:
    build:
      targets:
        VoCal: all
    run:
      config: Debug
      commandLineArguments:
        "-UITestMode": true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
